<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepcare - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/signup.css">
</head>
<body class="signup-body">
    <!-- Decorative Bubbles -->
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
    <div class="circle c4"></div>

    <main class="signup-container">
        <div class="glass-card signup-card">
            <!-- Back Arrow -->
            <a href="login.html" class="back-arrow">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </a>

            <div class="signup-content">
                <!-- Left Side: Form -->
                <div class="signup-form-area">
                    <header>
                        <h1>Sign Up</h1>
                        <p>to create an account</p>
                    </header>
                    
                    <form id="signupForm">
                        <div class="input-row">
                            <div class="input-group">
                                <input type="text" placeholder="First Name" required>
                            </div>
                            <div class="input-group">
                                <input type="text" placeholder="Last Name" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <input type="email" placeholder="Email" required>
                        </div>

                        <div class="input-group">
                            <input type="password" placeholder="Enter your password" required>
                        </div>

                        <div class="input-group phone-group">
                            <div class="country-code">
                                <img src="https://flagcdn.com/w20/ph.png" alt="PH">
                                <span>+63</span>
                            </div>
                            <input type="tel" placeholder="Mobile number" required>
                        </div>
                        
                        <button type="submit" class="btn-signup">Sign up</button>
                        
                        <div class="divider"><span>or</span></div>
                        
                       <!-- ... inside your form ... -->
<button type="button" class="btn-google">
    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
    <span>Sign Up With Google</span>
</button>
<!-- ... -->

                        <p class="footer-text">
                            Already have an account? <a href="login.html">Log In</a>
                        </p>
                    </form>
                </div>

                <!-- Right Side: Logo -->
                <div class="signup-logo-area">
                    <h1 class="logo-text">LOGO</h1>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/signup.js"></script>
</body>
</html>
