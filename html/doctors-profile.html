<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepcare - Doctor Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/doctors-profile.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">Deepcare</div>
        <nav>
            <ul>
                <li onclick="location.href='main.html'"><img src="../images/home-icon.png" alt="Home"><span>Home</span></li>
                <li onclick="location.href='chat.html'"><img src="../images/chat-icon.png" alt="Chat"><span>Chat</span></li>
               <li onclick="location.href='history.html'"><img src="../images/history-icon.png" alt="History"><span>History</span></li>
                <li class="active"><img src="../images/doctors-icon.png"><span>Doctors</span></li>
                <li onclick="location.href='main.html'"><img src="../images/products-icon.png" alt="Products"><span>Products</span></li>
                <li onclick="location.href='profile.html'"><img src="../images/profile-icon.png" alt="Profile"><span>Profile</span></li>
            </ul>
        </nav>
    </header>

    <main class="profile-container">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <h1 class="page-title">Doctors</h1>

        <div class="glass-frame">
            <h2 class="brand-watermark">Deepcare</h2>
            
            <div class="profile-header">
                <img src="../images/ai-man.png" class="profile-avatar">
                <div class="header-details">
                    <h1>Dr. Ivory Pearl</h1>
                    <p>Email: drivorypearl@gmail.com</p>
                    <p>Mobile: 09876543112</p>
                </div>
            </div>

            <div class="profile-content">
                <div class="left-col">
                    <h3>Location</h3>
                    <img src="../images/static-map.png" class="static-map">
                </div>
                <div class="right-col">
                    <p class="address"><strong>Address:</strong><br>Legarda Road, Baguio City, Benguet, Philippines</p>
                    <h3>Reviews</h3>
                    <div class="review-card">
                        <div class="review-user">
                            <img src="../images/doctor-profile-icon.png">
                            <span>Ev** S**rt</span>
                        </div>
                        <p class="review-text">Amazing Doctor!!! Will recommend.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
