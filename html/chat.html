<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepcare - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/chat.css">
</head>
<body>

   <header class="navbar">
    <div class="logo">Deepcare</div>
    <nav>
        <ul>
            <li onclick="location.href='main.html'"><img src="../images/home-icon.png" alt="Home"><span>Home</span></li>
            <li class="active"><img src="../images/chat-icon.png" alt="Chat"><span>Chat</span></li>
          <li onclick="location.href='history.html'"><img src="../images/history-icon.png" alt="History"><span>History</span></li>
            <li onclick="location.href='doctors.html'"><img src="../images/doctors-icon.png" alt="Doctors"><span>Doctors</span></li>
            <li onclick="location.href='main.html'"><img src="../images/products-icon.png" alt="Products"><span>Products</span></li>
            <li onclick="location.href='profile.html'"><img src="../images/profile-icon.png" alt="Profile"><span>Profile</span></li>
        </ul>
    </nav>
</header>

    <main class="chat-container">
        <!-- Floating background circles -->
        <div class="circle circle-left-top"></div>
        <div class="circle circle-left-bottom"></div>
        <div class="circle circle-right-mid"></div>

        <div class="chat-window" id="chatWindow">
            <!-- Messages will appear here -->
        </div>

        <div class="input-area">
            <input type="file" id="imageInput" accept="image/*" hidden>
            <button class="upload-btn" id="uploadTrigger">
                + Upload Image for Analysis
            </button>
            <button class="send-btn" id="sendBtn" style="display: none;">Send for Analysis</button>
        </div>
    </main>

    <script src="../js/chat.js"></script>
</body>
</html>
